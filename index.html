<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .form-signin {
            max-width: 400px;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        .form-floating > label {
            color: #667eea;
        }
        .btn-primary {
            background-color: #667eea;
            border-color: #667eea;
        }
        .btn-primary:hover {
            background-color: #764ba2;
            border-color: #764ba2;
        }
        p{
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

    </style>

</head>


<body>

    <main class="form-signin w-100 m-auto">
        <form id="formulario"> 
            <!-- <img class="mb-4" src="/docs/5.3/assets/brand/bootstrap-logo.svg" alt="" width="72" height="57" > -->
            <h1 class="h3 mb-3 fw-normal">Formulario de Registro</h1>
            
            <div class="form-floating"> 
                <input type="text" class="form-control" id="nombre" placeholder="Nombre">
                <label for="floatingInput">Nombre Completo</label>
                <p id="errornombre"></p>
            </div>


            <div class="form-floating"> 
                <input type="email" class="form-control" id="email" placeholder="Email"> 
                <label for="floatingPassword">Email</label> 
                <p id="erroremail"></p>
            </div>
            
            <div class="form-floating"> 
                <input type="password" class="form-control" id="password" placeholder="Contraseña"> 
                <label for="floatingPassword">Contraseña</label> 
                <p id="errorpassword"></p>
            </div>

            <div class="form-floating"> 
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirmar Contraseña"> 
                <label for="floatingPassword">Confirmar Contraseña</label> 
                <p id="errorconfirmPassword"></p>
            </div>
            
            
            <button class="btn btn-primary w-100 py-2" type="submit">Enviar</button>
        </form>
    </main>

</body>
<script src="main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
